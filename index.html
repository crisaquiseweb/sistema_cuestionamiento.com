<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="icon/cerrar.ico" type="image/x-icon">
</head>
<body style="background-image: url(https://img.freepik.com/vector-gratis/fondo-hexagonal-degradado_23-2148944164.jpg?t=st=1743178868~exp=1743182468~hmac=6dee7a86ad8d5240681219da568193dc898f7e257d1b303fa099f2f6d6354b1f&w=2000);">


    <div class="login-container" style="margin-top: 250px;">
        <h1>Iniciar Sesión</h1>
        <div class="form-group">
            <label for="username">Nombre </label>
            <input type="text" id="username" name="username" required placeholder="Ingresa Tu Nombre Aqui">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" readonly placeholder="Aleatorio">
        </div>
        <div class="form-group">
            <button type="button" id="generate-password" >Generar Contraseña</button>
        </div>
        <button id="login-button" type="button">Iniciar Sesion</button>
        <p><a href="#">Contactar al soporte</a></p>
    </div>

    <div class="chat-box">
        <div class="chat-header">Crismer te ayuda...</div>
        <div class="chat-body" id="chat-messages">
            <p class="bot-message">Bienvenido! ¿Para Ingresar al Sistema Primero Deberas Ingresar tu Nombre de Usuario Ejemplo:(PABLO), Luego le das Generar Contraseña, y Iniciar Sesion Te Recomiendo ingresar tu Nombre en Mayusculas? si tienes otra consulta Escribeme...</p>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Escribe tu pregunta...">
            <button id="send-button">Enviar</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
